<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            padding: 100px;
            height: 30vh;
        }
        .image{
            width: 200px;
            height: 200px;
            object-fit: cover;
            object-position: center;
            position: absolute;
        }
        .image:hover{
            cursor: pointer;
            z-index: 9999;
        }
        .image1{
           top: 100px;
           left: 0px;
        }
        .image2{
           top: 80px;
           left: 300px;
        }
        .image3{
            top: 150px;
            left: 350px;
        }
        .image4{
            width: 200px;
            height: 200px;
            top: 0px;
            left: 0px;
            right: 0px;
        }
        .block{
            width:300px ;
            height:300px ;
            border: 1px solid red;
            margin: 50px;
            position: relative;

        }
        .container{
            width: 50vw;
            height: 1000px;
            padding: 50px;
            box-shadow: 1px 1px 10px 10px gray;
            margin: 0 auto;
            position: relative;
        }
        .el{
            margin-bottom: 30px;
            height: 50px;
            background: green;
            color: white;
            font-size: 32px;
            text-align: center;
        }
        .el4{
            background: purple;
            position:sticky;
            top: 300px;
            width: 250px;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="el el1">1</div>
        <div class="el el2">2</div>
        <div class="el el3">3</div>
        <div class="el el4">4</div>
        <div class="el el5">5</div>
        <div class="el el6">6</div>
    </div>

    <img src="/pictures/vryadli.jpg" class="image image1"alt="img1">
    <img src="/pictures/birdwithleg.jpg" class="image image2"alt="img2">
    <img src="/pictures/silly_bird.jpg" class="image image3"alt="img3">
    <img src="/pictures/kana6.jpg" class="image image4"alt="img4">

    <div class="block"></div>
</body>
</html>
